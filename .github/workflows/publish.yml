name: Publish to npm

on:
  push:
    branches: [main, master]
    paths:
      - 'package.json'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    # Uncomment and match the name if you use a GitHub Environment
    # (and set the same name in npm Trusted Publisher settings):
    # environment: npm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Read package version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          NAME=$(node -p "require('./package.json').name")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "Package $NAME@$VERSION"

      - name: Check if version already published
        id: check
        run: |
          if npm view "${{ steps.version.outputs.name }}@${{ steps.version.outputs.version }}" version 2>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Version ${{ steps.version.outputs.version }} is already on npm — skipping publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Version ${{ steps.version.outputs.version }} is new — will publish."
          fi

      - name: Install dependencies
        if: steps.check.outputs.exists == 'false'
        run: npm ci

      - name: Test library
        if: steps.check.outputs.exists == 'false'
        run: npm test -- --watch=false

      - name: Build library
        if: steps.check.outputs.exists == 'false'
        run: npm run build

      # Auth via npm Trusted Publishing (OIDC) — no NPM_TOKEN needed.
      # Configure once: https://www.npmjs.com/package/datepicker-ng → Settings → Trusted Publisher
      - name: Publish package
        if: steps.check.outputs.exists == 'false'
        run: npm publish ./dist/datepicker-ng --access public --provenance
